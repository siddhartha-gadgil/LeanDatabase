name = "LeanDatabase"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["LeanDatabase", "Examples"]
testDriver = "Examples"

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0"

[[lean_lib]]
name = "LeanDatabase"

[[lean_lib]]
name = "Examples"
globs = ["Examples.+"]

[[lean_exe]]
name = "sql_process"
supportInterpreter = true
